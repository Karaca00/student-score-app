<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ระบบดูคะแนนนักเรียน | คำชะอีวิทยาคาร</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&family=Noto+Sans+Thai:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0f1a;
      --surface:   #131929;
      --card:      #1a2235;
      --border:    rgba(255,255,255,0.07);
      --accent:    #38bdf8;
      --gold:      #f9c846;
      --green:     #4ade80;
      --red:       #f87171;
      --purple:    #a78bfa;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --radius:    16px;
      --glow-g:    0 0 30px rgba(74,222,128,0.25);
      --glow-r:    0 0 30px rgba(248,113,113,0.25);
      --glow-b:    0 0 30px rgba(56,189,248,0.25);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Sarabun', 'Noto Sans Thai', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow-x: hidden;
    }

    /* ─── animated background blobs ─── */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #38bdf8, transparent);
      top: -100px; left: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #a78bfa, transparent);
      bottom: -80px; right: -80px;
      animation-direction: alternate-reverse;
    }
    @keyframes drift {
      0%   { transform: translate(0,0) scale(1); }
      100% { transform: translate(40px,30px) scale(1.1); }
    }

    /* ─── wrapper ─── */
    .wrapper {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
    }

    /* ─── header ─── */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .header .school-icon {
      font-size: 42px;
      margin-bottom: 8px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }
    .header h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: 0.5px;
      text-shadow: 0 0 20px rgba(249,200,70,0.4);
    }
    .header p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ─── login card ─── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      backdrop-filter: blur(12px);
    }

    .field-group { margin-bottom: 18px; }
    .field-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .field-group input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-family: inherit;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
    }
    .field-group input::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all .25s;
      position: relative;
      overflow: hidden;
    }
    .btn-primary {
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      color: #fff;
      box-shadow: 0 4px 20px rgba(14,165,233,0.35);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(14,165,233,0.5);
    }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

    /* spinner */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* error banner */
    .alert {
      background: rgba(248,113,113,0.12);
      border: 1px solid rgba(248,113,113,0.35);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      color: var(--red);
      margin-bottom: 16px;
      display: none;
    }
    .alert.show { display: block; }

    /* ─── results section ─── */
    #results { display: none; }
    #results.show { display: block; animation: fadeUp .5s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .student-badge {
      background: linear-gradient(135deg, var(--surface), #1e2d45);
      border: 1px solid rgba(56,189,248,0.2);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .student-badge .avatar {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .student-badge .name { font-size: 14px; font-weight: 600; }
    .student-badge .sub  { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* score cards grid */
    .score-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    @media (max-width: 380px) {
      .score-grid { grid-template-columns: 1fr; }
    }

    .score-card {
      border-radius: 14px;
      padding: 20px 14px;
      text-align: center;
      border: 1px solid transparent;
      position: relative;
      overflow: hidden;
      transition: transform .25s;
    }
    .score-card:hover { transform: translateY(-4px); }
    .score-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.07;
      border-radius: inherit;
    }

    .score-card.good {
      background: rgba(74,222,128,0.08);
      border-color: rgba(74,222,128,0.25);
      box-shadow: var(--glow-g);
    }
    .score-card.good .score-value { color: var(--green); text-shadow: 0 0 20px rgba(74,222,128,0.5); }

    .score-card.bad {
      background: rgba(248,113,113,0.08);
      border-color: rgba(248,113,113,0.25);
      box-shadow: var(--glow-r);
    }
    .score-card.bad .score-value { color: var(--red); text-shadow: 0 0 20px rgba(248,113,113,0.5); }

    .score-card.total {
      background: rgba(167,139,250,0.08);
      border-color: rgba(167,139,250,0.25);
      box-shadow: 0 0 30px rgba(167,139,250,0.2);
    }
    .score-card.total .score-value { color: var(--purple); text-shadow: 0 0 20px rgba(167,139,250,0.5); }

    .score-icon { font-size: 24px; margin-bottom: 8px; }
    .score-value {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1;
    }
    .score-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    /* refresh link */
    .actions {
      display: flex;
      gap: 10px;
    }
    .btn-outline {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      padding: 10px;
    }
    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: none;
      box-shadow: none;
    }

    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 11px;
      color: var(--muted);
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <!-- Header -->
    <div class="header">
      <span class="school-icon">🏫</span>
      <h1>คำชะอีวิทยาคาร</h1>
      <p>ระบบดูคะแนนนักเรียนออนไลน์</p>
    </div>

    <!-- Login Form -->
    <div class="card" id="loginSection">
      <div class="alert" id="errorAlert"></div>

      <div class="field-group">
        <label>Username / รหัสนักเรียน</label>
        <input type="text" id="username" placeholder="ป้อนรหัสนักเรียน" autocomplete="username" />
      </div>
      <div class="field-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="ป้อนรหัสผ่าน" autocomplete="current-password" />
      </div>

      <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">
        เข้าสู่ระบบ
      </button>
    </div>

    <!-- Results -->
    <div id="results" class="card">
      <!-- Student Info -->
      <div class="student-badge" id="studentBadge">
        <div class="avatar">👤</div>
        <div>
          <div class="name" id="studentName">นักเรียน</div>
          <div class="sub">คำชะอีวิทยาคาร</div>
        </div>
      </div>

      <!-- Score Cards -->
      <div class="score-grid">
        <div class="score-card good">
          <div class="score-icon">😇</div>
          <div class="score-value" id="scoreGood">—</div>
          <div class="score-label">คะแนนความดี</div>
        </div>
        <div class="score-card bad">
          <div class="score-icon">😔</div>
          <div class="score-value" id="scoreBad">—</div>
          <div class="score-label">ตัดคะแนน</div>
        </div>
        <div class="score-card total">
          <div class="score-icon">⭐</div>
          <div class="score-value" id="scoreTotal">—</div>
          <div class="score-label">สรุปรวม</div>
        </div>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button class="btn btn-outline" onclick="refresh()">🔄 รีเฟรช</button>
        <button class="btn btn-outline" onclick="logout()">🚪 ออกจากระบบ</button>
      </div>
    </div>

    <div class="footer">ข้อมูลดึงมาจากระบบ KCI &bull; &copy; 2025</div>
  </div>

  <script>
    let savedUsername = '', savedPassword = '';

    function showError(msg) {
      const el = document.getElementById('errorAlert');
      el.textContent = '⚠️ ' + msg;
      el.classList.add('show');
    }
    function hideError() {
      document.getElementById('errorAlert').classList.remove('show');
    }

    async function handleLogin() {
      hideError();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!username || !password) { showError('กรุณากรอกข้อมูลให้ครบ'); return; }

      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>กำลังเข้าสู่ระบบ...';

      try {
        const res = await fetch('/api/scores', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (!data.success) {
          showError(data.message || 'เข้าสู่ระบบไม่สำเร็จ');
          return;
        }

        savedUsername = username;
        savedPassword = password;
        displayResults(data);

      } catch (e) {
        showError('เชื่อมต่อ Server ไม่ได้: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'เข้าสู่ระบบ';
      }
    }

    function displayResults(data) {
      document.getElementById('loginSection').style.display = 'none';

      if (data.student) document.getElementById('studentName').textContent = data.student;
      document.getElementById('scoreGood').textContent  = data.scores.good  || '0';
      document.getElementById('scoreBad').textContent   = data.scores.bad   || '0';
      document.getElementById('scoreTotal').textContent = data.scores.total || '0';

      const results = document.getElementById('results');
      results.classList.add('show');
    }

    async function refresh() {
      if (!savedUsername) return;
      const btn = event.target;
      btn.textContent = '⏳ กำลังโหลด...';
      btn.disabled = true;
      try {
        const res = await fetch('/api/scores', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: savedUsername, password: savedPassword })
        });
        const data = await res.json();
        if (data.success) {
          document.getElementById('scoreGood').textContent  = data.scores.good;
          document.getElementById('scoreBad').textContent   = data.scores.bad;
          document.getElementById('scoreTotal').textContent = data.scores.total;
        }
      } finally {
        btn.textContent = '🔄 รีเฟรช';
        btn.disabled = false;
      }
    }

    function logout() {
      savedUsername = ''; savedPassword = '';
      document.getElementById('results').classList.remove('show');
      document.getElementById('loginSection').style.display = '';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
